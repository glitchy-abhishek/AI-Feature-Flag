version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiflags
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d aiflags"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/aiflags

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: >
      sh -c "sed -i 's/localhost/backend/g' app.py && streamlit run app.py --server.address 0.0.0.0"

volumes:
  pgdata: